# Enable BLE — required because xiao_ble_zmk_defconfig is not loaded
# automatically under Zephyr 4.1 HWMv2 board resolution
# See: https://github.com/zmkfirmware/zmk/pull/3145
CONFIG_ZMK_BLE=y

# Battery reporting configuration for zmk-battery-center compatibility
# See: https://github.com/kot149/zmk-battery-center

# Enable Bluetooth Battery Service
CONFIG_BT_BAS=y

# Enable ZMK battery reporting
CONFIG_ZMK_BATTERY_REPORTING=y

# For split keyboards: enable central side to fetch peripheral battery level
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# For split keyboards: enable central side to proxy peripheral battery level to host
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
