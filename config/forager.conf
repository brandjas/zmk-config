# Enable BLE — required because xiao_ble_zmk_defconfig is not loaded
# automatically under Zephyr 4.1 HWMv2 board resolution
# See: https://github.com/zmkfirmware/zmk/pull/3145
CONFIG_ZMK_BLE=y

# Maximize radio transmit power — negligible battery impact on nRF52840
# See: https://zmk.dev/docs/troubleshooting/connection-issues
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Disable 2M PHY — resolves pairing failures with Realtek/Intel/Broadcom chipsets
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Work around Windows BLE battery notification bug
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# Battery reporting
CONFIG_BT_BAS=y
CONFIG_ZMK_BATTERY_REPORTING=y

# Central fetches and proxies peripheral battery levels
# (only effective on the central; harmless on peripherals)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Deep sleep after 10 minutes of inactivity — most impactful power setting
# ~20µA draw on genuine nice!nano v2 / XIAO BLE
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000

# Soft off — clean BLE stack teardown via &soft_off keymap behavior
CONFIG_ZMK_PM_SOFT_OFF=y

# Insomnia — prevent sleep while BLE-connected to dongle/central
# Solves the dongle wake problem (peripherals sleeping → reconnection cascade)
# When disconnected (dongle unplugged), normal sleep resumes after idle timeout
CONFIG_ZMK_INSOMNIA_PING_ON_START=y
