layout: {zmk_keyboard: forager}
layers:
  colemak:
  - [Q, W, F, P, B, J, L, U, Y, '']
  - [A, R, S, T, G, M, N, E, I, O]
  - [Z, X, C, D, V, K, H, ',', ., fun]
  - [symbol, SPACE, RET, number]
  mac:
  - [Q, W, F, P, B, J, L, U, Y, '']
  - [A, R, S, T, G, M, N, E, I, O]
  - [Z, X, C, D, V, K, H, ',', ., fun]
  - [symbol, SPACE, RET, number]
  symbol:
  - ['', \, '%', $, '', '', ^, '{', '}', '']
  - ['*', (, ), ':', '', '', '"', '[', ']', ;]
  - [fun, '`', '@', '&', '', '', '#', <, '>', DEL]
  - - {type: held}
    - SPACE
    - RET
    - ESC
  number:
  - [BSPC, '4', '5', '6', '', '', '|', '-', /, '']
  - [., '1', '2', '3', '', '', '''', _, '=', nav]
  - ['~', '7', '8', '9', '', '', +, '?', '!', '']
  - - '0'
    - SPACE
    - RET
    - {type: held}
  nav:
  - ['', '', '', '', '', '', '', '', '', '']
  - - ''
    - ''
    - ''
    - ''
    - ''
    - LEFT
    - DOWN
    - UP
    - RIGHT
    - {type: held}
  - ['', '', '', '', '', HOME, PG DN, PG UP, END, '']
  - - ''
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {type: held}
  fun:
  - ['', F4, F5, F6, F10, '', PREV, PP, NEXT, '']
  - - CAPS
    - F1
    - F2
    - F3
    - F11
    - {t: BT, h: '2'}
    - MUTE
    - VOL DN
    - VOL UP
    - ''
  - - danger
    - F7
    - F8
    - F9
    - F12
    - {t: BT, h: '0'}
    - {t: BT, h: '1'}
    - BRI DN
    - BRI UP
    - {type: held}
  - - {t: colemak, h: toggle}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: mac, h: toggle}
  danger:
  - ['', '', '', '', '', BT CLR, OUT BLE, OUT USB, '&sys_reset', '']
  - ['', '', '', '', '', '', '', '', '', '&bootloader']
  - - {type: held}
    - ''
    - ''
    - ''
    - ''
    - ''
    - ''
    - ''
    - ''
    - {type: held}
  - ['', '', '', '']
  lock:
  - ['', '', '', '', '', '', '', '', '', '']
  - ['', '', '', '', '', '', '', '', '', '']
  - ['', '', '', '', '', '', '', '', '', '']
  - ['', '', '', '']
combos:
- p: [1, 2]
  k: TAB
  l: [colemak, mac, symbol, number, nav, fun, danger]
- p: [7, 8]
  k: {t: LSHFT, h: sticky}
  l: [colemak, mac, symbol, number, nav, fun, danger]
- p: [27, 28]
  k: BSPC
  l: [colemak, mac, symbol, number, nav, fun, danger]
- p: [32, 33]
  k: {t: LALT, h: sticky}
  l: [colemak, mac, symbol, number, nav, fun, danger]
- p: [30, 31]
  k: {t: LCTRL, h: sticky}
  l: [colemak]
- p: [21, 22]
  k: LGUI
  l: [colemak]
- p: [30, 31]
  k: {t: LGUI, h: sticky}
  l: [mac]
- p: [21, 22]
  k: {t: LCTRL, h: sticky}
  l: [mac]
- p: [1, 3]
  k: Q
  l: [colemak, mac, symbol, number, nav, fun, danger]
- p: [21, 23]
  k: Z
  l: [colemak, mac, symbol, number, nav, fun, danger]
- p: [14, 15]
  k: '&caps_word'
  l: [colemak, mac, symbol, number, nav, fun, danger]
- p: [20, 29, 30, 33]
  k: {t: lock, h: toggle}
  l: [colemak, mac, symbol, number, nav, fun, danger, lock]
